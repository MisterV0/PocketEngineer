              <div class="w-full input-card bg-zinc-50 border border-zinc-200 rounded-lg p-3 relative">
                <div class="flex justify-between items-center mb-1">
                  <label class="text-[10px] font-bold text-orange-600 uppercase block">Arabic Numerals</label>
                  <span class="text-[9px] text-zinc-400 font-medium">1 to 3999</span>
                </div>
                <input type="number" id="val-arabic" class="w-full bg-transparent font-mono text-lg outline-none"
                  placeholder="0" min="1" max="3999">
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Centered Info Modal -->
  <div id="info-modal"
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none modal-backdrop bg-zinc-900/40 backdrop-blur-sm"
    onclick="closeInfo(event)">
    <div
      class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 md:p-8 transform scale-95 modal-panel flex flex-col max-h-[85vh]"
      id="info-modal-content">
      <div class="flex justify-between items-start mb-4">
        <h3 id="info-title" class="text-xl font-bold text-zinc-900">Title</h3>
        <button onclick="closeInfo(event, true)" aria-label="Close"
          class="w-8 h-8 rounded-full bg-zinc-100 hover:bg-zinc-200 flex items-center justify-center text-zinc-500 transition-colors shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="overflow-y-auto hide-scroll">
        <div id="info-text" class="text-sm text-zinc-600 leading-relaxed space-y-4">
          <!-- Content injected via JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Info Modal Data & Logic ---
    const infoData = {
      'length': {
        title: 'Length Conversions',
        content: `
          <p><strong>Inches ↔ Millimeters:</strong><br/> 1 in = 25.4 mm. Inches accept <strong>fractions</strong> (e.g. <code>3/16</code>, <code>1 1/2</code>). <em>Use when:</em> drill bits, sheet metal, PCB traces, US/imperial specs.</p>
          <hr class="my-3 border-zinc-100">
          <p><strong>Kilometers ↔ Miles:</strong><br/> 1 km = 0.621371 mi. <em>Use when:</em> road signs, odometers, running/cycling distances, aviation (nm is different).</p>
          <hr class="my-3 border-zinc-100">
          <p><strong>Meters ↔ Feet:</strong><br/> 1 m = 3.28084 ft. <em>Use when:</em> room dimensions, ceiling height, runway length, altitude in feet.</p>
        `
      },
      'area': {
        title: 'Area Conversions',
        content: `
          <ul class="list-disc pl-5 space-y-1">
            <li><strong>1 m²</strong> = 10.7639 sq ft</li>
            <li><strong>1 Acre</strong> = 43,560 sq ft (≈ 4,046 m²)</li>
            <li><strong>1 Hectare</strong> = 10,000 m² (≈ 2.47 acres)</li>
          </ul>
          <p class="mt-3 text-zinc-600">Sq meters/feet for floors and walls; acres/hectares for land, farms, and real estate.</p>
        `
      },
      'volume': {
        title: 'Volume',
        content: `
          <ul class="list-disc pl-5 space-y-1">
            <li><strong>1 m³</strong> = 1000 L</li>
            <li><strong>1 L</strong> ≈ 33.814 US fl oz</li>
            <li><strong>1 US gal</strong> = 128 US fl oz ≈ 3.785 L</li>
          </ul>
          <p class="mt-3 text-zinc-600">Cubic meters for solids and large capacities; Liters for fuel and lab work; fl oz for drinks and recipes; gallons for tanks and fuel economy (US).</p>
          <p class="mt-2 text-xs text-zinc-400">US fluid measures; UK Imperial differs slightly.</p>
        `
      },
      'weight': {
        title: 'Weight & Mass',
        content: `<p>1 kg = 2.20462 lbs.</p><p class="mt-2 text-zinc-600">Body weight (kg in most countries, lbs in US/UK), luggage limits, gym plates, shipping weight, and material mass in specs.</p>`
      },
      'temperature': {
        title: 'Temperature',
        content: `
          <p><strong>Formulas:</strong></p>
          <ul class="list-disc pl-5 space-y-1 mt-2">
            <li><strong>C → F:</strong> (C × 9/5) + 32</li>
            <li><strong>F → C:</strong> (F − 32) × 5/9</li>
            <li><strong>C → K:</strong> C + 273.15</li>
          </ul>
          <p class="mt-3 text-zinc-600">Celsius for science and most of the world; Fahrenheit for US weather and some appliances; Kelvin for thermodynamics and absolute zero.</p>
        `
      },
      'power': {
        title: 'Power',
        content: `<p>1 hp ≈ 0.7457 kW.</p><p class="mt-2 text-zinc-600">Horsepower for cars, lawn mowers, and pumps; kilowatts for electric motors, solar panels, and grid power. Lets you compare engine specs to electrical ratings.</p>`
      },
      'pressure': {
        title: 'Pressure',
        content: `
          <ul class="list-disc pl-5 space-y-1">
            <li><strong>1 PSI</strong> ≈ 6894.76 Pa</li>
            <li><strong>1 bar</strong> = 100,000 Pa ≈ 14.5 PSI</li>
          </ul>
          <p class="mt-3 text-zinc-600">PSI for tires and US gauges; Pascals for SI and scientific; bar for European specs and compressors.</p>
        `
      },
      'numerals': {
        title: 'Roman ↔ Arabic Numerals',
        content: `
          <p>Same value, different notation. Range <strong>1–3999</strong>. Symbols: I(1), V(5), X(10), L(50), C(100), D(500), M(1000).</p>
          <p class="mt-2 text-zinc-600">Roman numerals for clock faces, outlines, copyright years, and classic numbering; convert to Arabic for arithmetic and modern use.</p>
        `
      }
    };

    function openInfo(id) {
      const data = infoData[id];
      if (!data) return;
      document.getElementById('info-title').innerHTML = data.title;
      document.getElementById('info-text').innerHTML = data.content;
      const modal = document.getElementById('info-modal');
      const content = document.getElementById('info-modal-content');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      content.classList.remove('scale-95');
    }

    function closeInfo(e, force = false) {
      if (force || e.target.id === 'info-modal') {
        const modal = document.getElementById('info-modal');
        const content = document.getElementById('info-modal-content');
        modal.classList.add('opacity-0', 'pointer-events-none');
        content.classList.add('scale-95');
      }
    }

    // --- Utility: Format Number ---
    function formatNumber(num) {
      if (isNaN(num) || !isFinite(num)) return '';
      return parseFloat(num.toFixed(6)).toString();
    }

    // --- Utility: Parse Fractions ---
    function parseFraction(val) {
      if (!val) return NaN;
      val = val.trim().replace(',', '.');
      if (!val.includes('/')) return parseFloat(val);
      let parts = val.split(' ');
      if (parts.length === 2) {
        let whole = parseFloat(parts[0]);
        let frac = parts[1].split('/');
        if (frac.length !== 2) return NaN;
        return whole + (parseFloat(frac[0]) / parseFloat(frac[1]));
      } else {
        let frac = val.split('/');
        if (frac.length !== 2) return NaN;
        return parseFloat(frac[0]) / parseFloat(frac[1]);
      }
    }

    // --- Generic 2-Way Binding Factory ---
    function bindConverter(id1, id2, forwardRate) {
      const el1 = document.getElementById(id1);
      const el2 = document.getElementById(id2);
      el1.addEventListener('input', () => {
        if (el1.value === '') { el2.value = ''; return; }
        el2.value = formatNumber(parseFloat(el1.value) * forwardRate);
      });
      el2.addEventListener('input', () => {
        if (el2.value === '') { el1.value = ''; return; }
        el1.value = formatNumber(parseFloat(el2.value) / forwardRate);
      });
    }

    // --- Initialize Conversions ---

    // 1. Length (Inches Fraction)
    const inEl = document.getElementById('val-in');
    const mmEl = document.getElementById('val-mm');
    inEl.addEventListener('input', () => {
      const val = parseFraction(inEl.value);
      if (isNaN(val)) { mmEl.value = ''; return; }
      mmEl.value = formatNumber(val * 25.4);
    });
    mmEl.addEventListener('input', () => {
      if (mmEl.value === '') { inEl.value = ''; return; }
      inEl.value = formatNumber(parseFloat(mmEl.value) / 25.4);
    });

    bindConverter('val-km', 'val-mi', 0.621371);
    bindConverter('val-m', 'val-ft', 3.28084);

    // 2. Area (4-Way)
    const aM2 = document.getElementById('val-m2');
    const aSqft = document.getElementById('val-sqft');
    const aAcre = document.getElementById('val-acre');
    const aHect = document.getElementById('val-hectare');

    function updateArea(source, valInM2) {
      if (isNaN(valInM2)) { aM2.value = ''; aSqft.value = ''; aAcre.value = ''; aHect.value = ''; return; }
      if (source !== aM2) aM2.value = formatNumber(valInM2);
      if (source !== aSqft) aSqft.value = formatNumber(valInM2 * 10.7639104);
      if (source !== aAcre) aAcre.value = formatNumber(valInM2 / 4046.85642);
      if (source !== aHect) aHect.value = formatNumber(valInM2 / 10000);
    }
    aM2.addEventListener('input', () => updateArea(aM2, parseFloat(aM2.value)));
    aSqft.addEventListener('input', () => updateArea(aSqft, parseFloat(aSqft.value) / 10.7639104));
    aAcre.addEventListener('input', () => updateArea(aAcre, parseFloat(aAcre.value) * 4046.85642));
    aHect.addEventListener('input', () => updateArea(aHect, parseFloat(aHect.value) * 10000));

    // 3. Volume (4-Way)
    const vM3 = document.getElementById('val-m3');
    const vL = document.getElementById('val-l');
    const vOz = document.getElementById('val-floz');
    const vGal = document.getElementById('val-gal');

    function updateVolume(source, valInL) {
      if (isNaN(valInL)) { vM3.value = ''; vL.value = ''; vOz.value = ''; vGal.value = ''; return; }
      if (source !== vM3) vM3.value = formatNumber(valInL / 1000);
      if (source !== vL) vL.value = formatNumber(valInL);
      if (source !== vOz) vOz.value = formatNumber(valInL * 33.8140226);
      if (source !== vGal) vGal.value = formatNumber(valInL * 0.264172052);
    }
    vM3.addEventListener('input', () => updateVolume(vM3, parseFloat(vM3.value) * 1000));
    vL.addEventListener('input', () => updateVolume(vL, parseFloat(vL.value)));
    vOz.addEventListener('input', () => updateVolume(vOz, parseFloat(vOz.value) / 33.8140226));
    vGal.addEventListener('input', () => updateVolume(vGal, parseFloat(vGal.value) / 0.264172052));

    // 4. Weight
    bindConverter('val-kg', 'val-lbs', 2.20462);

    // 5. Temperature (3-Way)
    const tC = document.getElementById('val-c');
    const tF = document.getElementById('val-f');
    const tK = document.getElementById('val-k');
    tC.addEventListener('input', () => {
      if (tC.value === '') { tF.value = ''; tK.value = ''; return; }
      const c = parseFloat(tC.value);
      tF.value = formatNumber((c * 9 / 5) + 32);
      tK.value = formatNumber(c + 273.15);
    });
    tF.addEventListener('input', () => {
      if (tF.value === '') { tC.value = ''; tK.value = ''; return; }
      const c = (parseFloat(tF.value) - 32) * 5 / 9;
      tC.value = formatNumber(c);
      tK.value = formatNumber(c + 273.15);
    });
    tK.addEventListener('input', () => {
      if (tK.value === '') { tC.value = ''; tF.value = ''; return; }
      const c = parseFloat(tK.value) - 273.15;
      tC.value = formatNumber(c);
      tF.value = formatNumber((c * 9 / 5) + 32);
    });

    // 6. Power
    bindConverter('val-hp', 'val-kw', 0.7457);

    // 7. Pressure (3-Way)
    const pPsi = document.getElementById('val-psi');
    const pPa = document.getElementById('val-pa');
    const pBar = document.getElementById('val-bar');
    function updatePressure(source, valInPa) {
      if (isNaN(valInPa)) { pPsi.value = ''; pPa.value = ''; pBar.value = ''; return; }
      if (source !== pPa) pPa.value = formatNumber(valInPa);
      if (source !== pPsi) pPsi.value = formatNumber(valInPa / 6894.75729);
      if (source !== pBar) pBar.value = formatNumber(valInPa / 100000);
    }
    pPa.addEventListener('input', () => updatePressure(pPa, parseFloat(pPa.value)));
    pPsi.addEventListener('input', () => updatePressure(pPsi, parseFloat(pPsi.value) * 6894.75729));
    pBar.addEventListener('input', () => updatePressure(pBar, parseFloat(pBar.value) * 100000));

    // 8. Numerals (Roman ↔ Arabic)
    const rRoman = document.getElementById('val-roman');
    const rArabic = document.getElementById('val-arabic');

    function toRoman(num) {
      if (num < 1 || num > 3999) return '';
      const roman = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let str = '';
      for (let i of Object.keys(roman)) {
        let q = Math.floor(num / roman[i]);
        num -= q * roman[i];
        str += i.repeat(q);
      }
      return str;
    }

    function toArabic(str) {
      str = str.toUpperCase();
      const roman = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
      let num = 0;
      for (let i = 0; i < str.length; i++) {
        let curr = roman[str[i]];
        let next = roman[str[i + 1]];
        if (!curr) return NaN;
        if (next && curr < next) num -= curr;
        else num += curr;
      }
      return num;
    }

    rArabic.addEventListener('input', () => {
      let val = parseInt(rArabic.value);
      if (isNaN(val) || val < 1 || val > 3999) { rRoman.value = ''; return; }
      rRoman.value = toRoman(val);
    });

    rRoman.addEventListener('input', () => {
      let val = toArabic(rRoman.value);
      if (isNaN(val) || val < 1 || val > 3999) { rArabic.value = ''; return; }
      rArabic.value = val;
    });

    // --- Reset All ---
    function resetAll() {
      document.querySelectorAll('input').forEach(input => input.value = '');
    }

    // --- ScrollSpy ---
    const sections = document.querySelectorAll('section');
    const navLinks = document.querySelectorAll('.nav-link');
    const scrollContainer = document.getElementById('scroll-container');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(link => link.classList.remove('active'));
          const activeLink = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
          if (activeLink) {
            activeLink.classList.add('active');
            if (window.innerWidth < 768) {
              activeLink.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
          }
        }
      });
    }, { root: scrollContainer, rootMargin: '-20% 0px -70% 0px', threshold: 0 });

    sections.forEach(section => observer.observe(section));

    // --- Mobile Keyboard Back Button Fix ---
    let keyboardOpen = false;
    let historyStatePushed = false;
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        keyboardOpen = true;
        if (!historyStatePushed) {
          history.pushState({ keyboardOpen: true }, '');
          historyStatePushed = true;
        }
      });
      input.addEventListener('blur', () => {
        keyboardOpen = false;
        historyStatePushed = false;
      });
    });
    window.addEventListener('popstate', (e) => {
      if (keyboardOpen) {
        const activeElement = document.activeElement;
        if (activeElement && activeElement.tagName === 'INPUT') {
          activeElement.blur();
          history.pushState({ keyboardOpen: true }, '');
          e.preventDefault();
        }
      }
    });
  </script>
</body>
